{% extends "base.html" %}
{% block title %}Password Reset Complete — LandReserve{% endblock %}
{% block body_class %}bg-form-premium{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-16 flex justify-center items-center flex-1">
    <div class="w-full max-w-md">
        <div class="form-glass border border-white/20 rounded-2xl p-8 shadow-2xl text-center">
            <div class="w-16 h-16 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="bi bi-patch-check text-3xl text-green-600"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">Success!</h1>
            <p class="text-sm text-gray-500 mt-4 leading-relaxed">
                Your password has been set. You may now log in with your new credentials.
            </p>
            
            <div class="mt-8">
                <button onclick="openModal('login')" class="inline-flex items-center justify-center px-6 py-3 bg-[#1a5c38] text-white rounded-xl font-bold text-sm hover:bg-[#134428] transition-all no-underline w-full">
                    Log in now
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
