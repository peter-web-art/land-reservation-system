{% extends "base.html" %}
{% block title %}Too Many Requests · LandReserve{% endblock %}
{% block content %}
<div class="min-h-[70vh] flex flex-col items-center justify-center px-4 text-center">
  <div class="w-20 h-20 bg-amber-100 rounded-full flex items-center justify-center mb-6">
    <i class="bi bi-lightning-charge-fill text-amber-500 text-3xl"></i>
  </div>
  <h1 class="text-4xl font-bold text-gray-900 mb-2">Slow down!</h1>
  <p class="text-lg text-gray-500 mb-2">Too many requests</p>
  <p class="text-sm text-gray-400 mb-8 max-w-sm">You're sending requests too quickly. Please wait a moment before trying again.</p>
  <a href="/" class="inline-flex items-center gap-2 px-6 py-3 bg-[#1a5c38] text-white rounded-xl font-semibold text-sm hover:bg-[#134428] transition-colors no-underline">
    <i class="bi bi-house"></i> Go Home
  </a>
</div>
{% endblock %}
